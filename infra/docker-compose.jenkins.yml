name: automation-jenkins

services:
  jenkins:
    build:
      context: ..
      dockerfile: infra/jenkins/Dockerfile
    container_name: jenkins
    user: root
    restart: unless-stopped
    ports:
      - "${JENKINS_HOST_PORT:-8090}:${JENKINS_HTTP_PORT:-8080}"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    environment:
      JENKINS_OPTS: "--httpPort=${JENKINS_HTTP_PORT:-8080}"
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      CASC_JENKINS_CONFIG: "/var/jenkins_home/casc_configs/jenkins.yaml"
      JENKINS_ADMIN_ID: "${JENKINS_ADMIN_ID:-admin}"
      JENKINS_ADMIN_PASSWORD: "${JENKINS_ADMIN_PASSWORD:-admin123}"
      JENKINS_URL: "${JENKINS_URL:-http://localhost:8090/}"
      SEED_REPO_URL: "${SEED_REPO_URL:-}"
      SEED_REPO_BRANCH: "${SEED_REPO_BRANCH:-master}"
      SEED_CREDENTIALS_ID: "${SEED_CREDENTIALS_ID:-}"
      SEED_JOB_CONFIG_GLOB: "${SEED_JOB_CONFIG_GLOB:-infra/jenkins/jobs/*.yml}"
      SEED_DSL_SCRIPT: "${SEED_DSL_SCRIPT:-infra/jenkins/job-dsl/jobs_from_yaml.groovy}"
      SEED_PIPELINE_TEMPLATE: "${SEED_PIPELINE_TEMPLATE:-infra/jenkins/pipelines/cucumber-job-template.groovy}"
    volumes:
      - jenkins_home:/var/jenkins_home
      - "${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock"
      - ./jenkins/casc:/var/jenkins_home/casc_configs:ro
    networks:
      - automation-net

volumes:
  jenkins_home:

networks:
  automation-net:
    name: automation-net
    driver: bridge
