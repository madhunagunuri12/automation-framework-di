handlers= java.util.logging.ConsoleHandler
.level= INFO

java.util.logging.ConsoleHandler.level = INFO
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# Suppress noisy Selenium process-stream close warnings in CI containers.
org.openqa.selenium.os.ExternalProcess.level = SEVERE
org.openqa.selenium.manager.level = WARNING
